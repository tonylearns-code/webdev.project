<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HireVo</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav>
        <div class="container">
            <div class="logo">HireVo</div>
            <ul class="nav-links">
                <li><a href="index.html">Browse Jobs</a></li>
                <li><a href="index.html">Companies</a></li>
                <li><a href="index.html">About</a></li>
            </ul>
            <div class="auth-buttons">
                <a href="login.html" class="btn btn-login">Login</a>
                <a href="register.html" class="btn btn-register">Register</a>
            </div>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="form-container">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to your account to continue</p>

        <form id="login-form">
            <div class="form-group">
                <label for="login-email">Email Address</label>
                <input type="email" id="login-email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="Enter your password" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="remember-me">
                <label for="remember-me">Remember me</label>
            </div>

            <div class="form-buttons">
                <button type="submit" class="btn-submit">Sign In</button>
            </div>

            <div class="form-link">
                <a href="#">Forgot your password?</a>
            </div>
        </form>

        <div class="form-link">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 HireVo. All rights reserved.</p>
    </footer>

    <script src="assets/js/form-handler.js"></script>
</body>
</html>
